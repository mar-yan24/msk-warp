# Penalty-model adjoint: free-body base + friction damping
# Mimics dflex's bounded BPTT eigenvalues in the backward pass
# while keeping MuJoCo's Newton solver in the forward pass.
params:
  general:
    seed: 42
    device: cuda:0
    logdir: logs/exp_penalty_adjoint

  env:
    name: Ant
    model_path: assets/ant_substeps4.xml
    num_actors: 64
    episode_length: 1000
    stochastic_init: true
    substeps: 4
    action_strength: 1.0
    early_termination: true
    use_fd_jacobian: false
    tape_per_substep: true
    smooth_adjoint: true
    penalty_damping_alpha: 0.1

  network:
    actor: ActorStochasticMLP
    actor_mlp:
      units: [128, 64, 32]
      activation: elu
    critic: CriticMLP
    critic_mlp:
      units: [64, 64]
      activation: elu

  config:
    name: ant_penalty_adjoint
    gamma: 0.99
    steps_num: 32
    max_epochs: 500
    actor_learning_rate: 2e-3
    critic_learning_rate: 2e-3
    lr_schedule: constant
    betas: [0.7, 0.95]
    target_critic_alpha: 0.2
    obs_rms: true
    ret_rms: false
    critic_iterations: 16
    critic_method: td-lambda
    lambda: 0.95
    num_batch: 4
    num_actors: 64
    truncate_grads: true
    grad_norm: 20.0
    state_bptt: true
    state_grad_clip: 0.0
    state_grad_decay: 0.0
    obs_grad_clip: 0.0
    save_interval: 100
