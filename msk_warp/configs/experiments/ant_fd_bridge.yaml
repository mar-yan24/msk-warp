# Experiment: FD Jacobian bridge (fixed norm-based clipping)
# Hypothesis: FD provides more accurate ctrl gradients for contact-rich dynamics
#   than the tape-per-substep mode (which has 7x attenuation + direction errors)
# Trade-off: ~20x slower per backward (31 forward calls per substep)
# Baseline comparison: configs/ant_shac.yaml (tape-per-substep)
params:
  general:
    seed: 42
    device: cuda:0
    logdir: logs/exp_fd_bridge

  env:
    name: Ant
    model_path: assets/ant.xml
    num_actors: 64
    episode_length: 1000
    stochastic_init: true
    substeps: 16
    action_strength: 1.0
    early_termination: true
    use_fd_jacobian: true
    tape_per_substep: false

  network:
    actor: ActorStochasticMLP
    actor_mlp:
      units: [128, 64, 32]
      activation: elu
    critic: CriticMLP
    critic_mlp:
      units: [64, 64]
      activation: elu

  config:
    name: ant_fd_bridge
    gamma: 0.99
    steps_num: 32
    max_epochs: 2000
    actor_learning_rate: 2e-3
    critic_learning_rate: 2e-3
    lr_schedule: linear
    betas: [0.7, 0.95]
    target_critic_alpha: 0.2
    obs_rms: true
    ret_rms: false
    critic_iterations: 16
    critic_method: td-lambda
    lambda: 0.95
    num_batch: 4
    num_actors: 64
    truncate_grads: true
    grad_norm: 1.0
    state_bptt: true
    state_grad_clip: 5.0
    obs_grad_clip: 0.0
    save_interval: 400
