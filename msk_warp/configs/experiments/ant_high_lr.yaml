# Experiment: Higher learning rate + relaxed grad clipping
# Hypothesis: BPTT gradient IS directionally useful (pure_vel proved this), but
#   effective learning rate is too small (lr=2e-3, grad_norm=50 -> effective 4e-5).
#   Increase lr to 1e-2 and grad_norm clip to 5.0 for ~25x larger updates.
# Baseline comparison: configs/ant_shac.yaml (lr=2e-3, grad_norm=1.0)
params:
  general:
    seed: 42
    device: cuda:0
    logdir: logs/exp_high_lr

  env:
    name: Ant
    model_path: assets/ant.xml
    num_actors: 64
    episode_length: 1000
    stochastic_init: true
    substeps: 16
    action_strength: 1.0
    early_termination: true
    use_fd_jacobian: false
    tape_per_substep: true

  network:
    actor: ActorStochasticMLP
    actor_mlp:
      units: [128, 64, 32]
      activation: elu
    critic: CriticMLP
    critic_mlp:
      units: [64, 64]
      activation: elu

  config:
    name: ant_high_lr
    gamma: 0.99
    steps_num: 32
    max_epochs: 2000
    actor_learning_rate: 1e-2
    critic_learning_rate: 2e-3
    lr_schedule: linear
    betas: [0.7, 0.95]
    target_critic_alpha: 0.2
    obs_rms: true
    ret_rms: false
    critic_iterations: 16
    critic_method: td-lambda
    lambda: 0.95
    num_batch: 4
    num_actors: 64
    truncate_grads: true
    grad_norm: 5.0
    state_bptt: true
    state_grad_clip: 5.0
    obs_grad_clip: 0.0
    save_interval: 400
