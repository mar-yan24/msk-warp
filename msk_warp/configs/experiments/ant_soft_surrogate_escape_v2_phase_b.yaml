# Soft-surrogate Ant transfer stage for standing-basin escape.
# Phase B warm-starts from Phase A, removes reward shaping, and keeps a milder
# reset curriculum while increasing the SHAC horizon.
params:
  general:
    seed: 42
    device: cuda:0
    logdir: logs/exp_soft_surrogate_escape_v2_phase_b
    init_policy: null

  env:
    name: Ant
    model_path: assets/ant_soft.xml
    num_actors: 64
    episode_length: 1000
    stochastic_init: true
    substeps: 4
    action_strength: 1.0
    early_termination: true
    use_fd_jacobian: false
    tape_per_substep: true
    smooth_adjoint: true
    friction_surrogate_adjoint: true
    friction_surrogate_alpha: 0.9
    reset_curriculum:
      enabled: true
      anneal_epochs: 20
      canonical_prob_init: 0.7
      x_vel_range: [0.2, 0.5]
      y_vel_abs_max: 0.1
      yaw_deg_abs_max: 12.0
      yaw_rate_abs_max: 0.4

  network:
    actor: ActorStochasticMLP
    actor_mlp:
      units: [128, 64, 32]
      activation: elu
    critic: CriticMLP
    critic_mlp:
      units: [64, 64]
      activation: elu

  config:
    name: ant_soft_surrogate_escape_v2_phase_b
    gamma: 0.99
    steps_num: 16
    max_epochs: 20
    actor_learning_rate: 1e-3
    critic_learning_rate: 2e-3
    lr_schedule: constant
    betas: [0.7, 0.95]
    target_critic_alpha: 0.2
    obs_rms: true
    ret_rms: true
    critic_iterations: 16
    critic_method: td-lambda
    lambda: 0.95
    num_batch: 4
    num_actors: 64
    truncate_grads: true
    grad_norm: 20.0
    actor_grad_norm: 40.0
    actor_grad_norm_init: 200.0
    actor_grad_norm_warmup_epochs: 20
    critic_grad_norm: 20.0
    state_bptt: true
    state_grad_clip: 2.0
    state_grad_decay: 0.85
    obs_grad_clip: 0.0
    save_interval: 20
