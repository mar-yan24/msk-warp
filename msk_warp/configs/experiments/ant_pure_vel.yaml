# Experiment: Pure forward velocity reward (no standing-still basin)
# Hypothesis: Removing heading/height/up per-step rewards eliminates the local
#   optimum at standing. Early termination provides implicit "stay upright" signal.
#   Standing reward = 0, walking at 1 m/s = 1.0/step -> strong gradient for locomotion
# Baseline comparison: configs/ant_shac.yaml
params:
  general:
    seed: 42
    device: cuda:0
    logdir: logs/exp_pure_vel

  env:
    name: Ant
    model_path: assets/ant.xml
    num_actors: 64
    episode_length: 1000
    stochastic_init: true
    substeps: 16
    action_strength: 1.0
    early_termination: true
    use_fd_jacobian: false
    tape_per_substep: true
    forward_vel_weight: 1.0
    heading_weight: 0.0
    up_weight: 0.0
    height_weight: 0.0

  network:
    actor: ActorStochasticMLP
    actor_mlp:
      units: [128, 64, 32]
      activation: elu
    critic: CriticMLP
    critic_mlp:
      units: [64, 64]
      activation: elu

  config:
    name: ant_pure_vel
    gamma: 0.99
    steps_num: 32
    max_epochs: 2000
    actor_learning_rate: 2e-3
    critic_learning_rate: 2e-3
    lr_schedule: linear
    betas: [0.7, 0.95]
    target_critic_alpha: 0.2
    obs_rms: true
    ret_rms: false
    critic_iterations: 16
    critic_method: td-lambda
    lambda: 0.95
    num_batch: 4
    num_actors: 64
    truncate_grads: true
    grad_norm: 1.0
    state_bptt: true
    state_grad_clip: 5.0
    obs_grad_clip: 0.0
    save_interval: 400
